name: Repository Baseline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Sync development dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check src tests scripts

      - name: Pytest
        run: uv run pytest

      - name: Mypy
        run: uv run mypy src tests scripts

      - name: Deterministic smoke checks
        run: uv run python scripts/run_smoke_checks.py
