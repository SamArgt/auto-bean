interface:
  display_name: "Write Ledger Transactions"
  short_description: "Draft and review Beancount transactions safely"
  default_prompt: "Use $auto-bean-write-transactions to add or correct Beancount transaction entries in `ledger.beancount` or `beancount/**`, inspect current ledger conventions and relevant `open` directives first, write explicit balanced postings from trusted evidence, pause for bounded clarification instead of guessing when account identity, currency, transfer intent, or duplicate risk is ambiguous, then validate the result and present the exact ledger change for final approval."

policy:
  allow_implicit_invocation: true
