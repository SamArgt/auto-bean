interface:
  display_name: "Write Ledger Transactions"
  short_description: "Draft and review Beancount transactions safely"
  default_prompt: "Use $auto-bean-write to add or correct Beancount transaction entries in `ledger.beancount` or `beancount/**`, inspect current ledger conventions and relevant `open` directives first, write explicit balanced postings from trusted evidence, ask and wait for bounded clarification instead of guessing when used directly, return pending questions to $auto-bean-import when called by the import workflow, then resume, validate, and present the exact ledger change for review."

policy:
  allow_implicit_invocation: true
