interface:
  display_name: "Categorize Statement"
  short_description: "Categorize, reconcile, and deduplicate one parsed statement"
  default_prompt: "Use $auto-bean-categorize for one assigned categorize_ready parsed statement JSON file or explicit import-provided Markdown handoff artifact: create or open the user-friendly fillable Markdown review artifact under `.auto-bean/artifacts/categorize/`, use the memory for categorization, use $auto-bean-query for ledger reads, identify reconciliation and deduplication findings, update the artifact after all available questions/findings/posting inputs are collected, mark categorize_blocked or categorize_review, and return posting inputs, blockers, required user input, artifact paths, and memory suggestions back to $auto-bean-import for ledger-writing handoff and finalization."

policy:
  allow_implicit_invocation: false
