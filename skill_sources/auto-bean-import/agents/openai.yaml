interface:
  display_name: "Import Statements"
  short_description: "Run the full statement import workflow"
  default_prompt: "Use $auto-bean-import to inspect raw statements and import status, process only new or stale inputs, resolve parsed_with_warning process artifacts into ready_for_categorization, derive first-seen accounts, delegate ready_for_categorization work to $auto-bean-categorize, review ready_for_review artifacts and ask the user for needed input, mark ready_to_write, post transactions with $auto-bean-write, validate into final_review, and mark done only after user approval."

policy:
  allow_implicit_invocation: true
