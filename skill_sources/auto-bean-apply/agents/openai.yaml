interface:
  display_name: "Apply Ledger Changes"
  short_description: "Review candidate ledger edits and posting changes"
  default_prompt: "Use $auto-bean-apply to turn reviewed parsed statement evidence into drafted Beancount postings in the workspace or review another structural ledger change, run reconciliation checks for likely transfers, possible duplicates, unbalanced outcomes, currency risk, and possible future transfers, present each finding with a suggested action and ask the user for a decision on each one, then apply those decisions before asking for final commit or push approval."

policy:
  allow_implicit_invocation: true
