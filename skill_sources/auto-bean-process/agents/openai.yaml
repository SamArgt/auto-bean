interface:
  display_name: "Process Statements"
  short_description: "Process one raw statement into parsed evidence"
  default_prompt: "Use $auto-bean-process for one assigned raw statement: normalize it into `statements/parsed/`, update only that input's `statements/import-status.yml` entry to ready, parsed, or parsed_with_warning, persist process questions under `.auto-bean/artifacts/process/` using the shared raw-statement filename prefix, collect memory suggestions, and return control to $auto-bean-import without asking the user or deriving first-seen accounts."

policy:
  allow_implicit_invocation: false
